<!DOCTYPE html>
<html>
<head>
    <title>2473035_Albert Zidane Meidi</title>
    <script type="text/javascript" src="jquery-3.7.1.min.js"></script>
    <script type="text/javascript">
        $(document).ready(function () {
            $(".header").click(function () {
                if ($(this).prop("checked")) {
                    $("input:checkbox.body").prop("checked", true);
                }
                else {
                    $("input:checkbox.body").prop("checked", false);
                }
            });
        });
    </script>
    <style>
        td {
            width: 50px;
            text-align: center;
        }
    </style>
</head>
<body>
    <table border="1" cellpadding="0" cellspacing="0">
        <tr>
            <td>
                <input type="checkbox" class="header">
                <hr />
                <input type="checkbox" class="body"><br />
                <input type="checkbox" class="body"><br />
                <input type="checkbox" class="body"><br />
                <input type="checkbox" class="body"><br />
            </td>
        </tr>
    </table>
</body>
</html>
