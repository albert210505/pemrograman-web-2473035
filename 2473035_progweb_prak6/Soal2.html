<!DOCTYPE html>
<html>

<head>
    <title>2473035-Albert Zidane Meidi</title>

    <style>
        table {
            border-collapse: collapse;
            margin-top: 20px;
        }

        td {
            width: 50px;
            height: 50px;
            text-align: center;
            border: 2px solid black;
            font-size: 18px;
        }
    </style>

    <script>
        function buatTabel() {

            var angka;

            while (true) {
                angka = prompt("A number?");

                if (angka !== null && angka !== "" && !isNaN(angka)) {
                    angka = parseInt(angka);
                    break;
                }
            }

            var hasil = "<table>";

            for (var i = 1; i <= angka; i++) {
                hasil += "<tr>";
                hasil += "<td>" + i + "</td>";
                hasil += "<td>x</td>";
                hasil += "<td>" + angka + "</td>";
                hasil += "<td>=</td>";
                hasil += "<td>" + (i * angka) + "</td>";
                hasil += "</tr>";
            }

            hasil += "</table>";

            document.getElementById("output").innerHTML = hasil;
        }
    </script>

</head>

<body onload="buatTabel()">

    <div id="output"></div>

</body>

</html>
