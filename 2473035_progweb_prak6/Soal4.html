<!DOCTYPE html>
<html>

<head>
    <title>2473035-Albert Zidane Meidi</title>

    <style>
        .container {
            width: 300px;
            padding: 10px;
            border: 1px solid #000;
        }

        input,
        select,
        button {
            margin: 5px;
        }
    </style>

    <script>
        function proses() {

            var input = document.getElementById("input").value;
            var mode = document.getElementById("mode").value;

            if (mode == "dec2bin") {

                if (isNaN(input) || input < 0 || input > 255) {
                    alert("input harus 0 - 255");
                    return;
                }

                var n = parseInt(input);
                var hasil = "";

                for (var i = 0; i < 8; i++) {
                    hasil = (n % 2) + hasil;
                    n = Math.floor(n / 2);
                }

                document.getElementById("output").value = hasil;
            }

            else {

                if (input.length != 8) {
                    alert("harus 8 digit");
                    return;
                }

                var total = 0;

                for (var i = 0; i < 8; i++) {
                    if (input[i] != '0' && input[i] != '1') {
                        alert("hanya 0 dan 1");
                        return;
                    }
                    total += parseInt(input[i]) * Math.pow(2, 7 - i);
                }

                document.getElementById("output").value = total;
            }
        }

        function resetForm() {
            document.getElementById("input").value = "";
            document.getElementById("output").value = "";
        }
    </script>

</head>

<body>

    <div class="container">

        Input :
        <input type="text" id="input"><br>

        Output :
        <input type="text" id="output" readonly><br>

        <select id="mode">
            <option value="dec2bin">decimal-biner</option>
            <option value="bin2dec">biner-decimal</option>
        </select><br>

        <button onclick="proses()">PROSES</button>
        <button onclick="resetForm()">RESET</button>

    </div>

</body>

</html>
