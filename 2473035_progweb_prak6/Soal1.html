<!DOCTYPE html>
<html>

<head>
    <title>2473035-Albert Zidane Meidi</title>

    <style>
        body {font-family: Arial;}
        .container {
            width: 300px;
            padding: 10px;
            background: #eee;
        }
        input {margin: 2px;}
        button {margin: 5px;}
        table {
            border-collapse: collapse;
            margin-top: 10px;
        }
        td {
            width: 50px;
            height: 50px;
            text-align: center;
            border: 2px solid black;
            font-size: 20px;
        }
    </style>

    <script>
        function hitung() {

            var a = document.getElementById("angka1").value;
            var b = document.getElementById("angka2").value;

            if (isNaN(a) && isNaN(b)) {
                alert("angka pertama dan kedua harus angka");
                return;
            }
            else if (isNaN(a)) {
                alert("angka pertama bukan angka");
                return;
            }
            else if (isNaN(b)) {
                alert("angka kedua harus angka");
                return;
            }

            a = parseInt(a);
            b = parseInt(b);

            document.getElementById("a1").innerHTML = a;
            document.getElementById("b1").innerHTML = b;
            document.getElementById("h1").innerHTML = a + b;

            document.getElementById("a2").innerHTML = a;
            document.getElementById("b2").innerHTML = b;
            document.getElementById("h2").innerHTML = a - b;
        }
    </script>
</head>
<body>
    <div class="container">
        Angka Pertama :
        <input type="text" id="angka1"><br>
        Angka Kedua :
        <input type="text" id="angka2"><br>
        <button onclick="hitung()">Count</button>
        <table>
            <tr>
                <td id="a1"></td>
                <td>+</td>
                <td id="b1"></td>
                <td>=</td>
                <td id="h1"></td>
            </tr>

            <tr>
                <td id="a2"></td>
                <td>-</td>
                <td id="b2"></td>
                <td>=</td>
                <td id="h2"></td>
            </tr>
        </table>

    </div>

</body>

</html>
