<!DOCTYPE html>
<html>
<title>2473035-Albert Zidane Meidi</title>

<head>
    <style>
        .container {
            width: 250px;
            height: 250px;
            margin: auto;
            position: relative;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container img {
            width: 150px;
        }

        .corner {
            width: 50px;
            height: 50px;
            position: absolute;
        }

        .tl {
            top: 0;
            left: 0;
            border-top: 5px solid #FF0000;
            border-left: 5px solid #FF0000;
        }

        .tr {
            top: 0;
            right: 0;
            border-top: 5px solid #FF0000;
            border-right: 5px solid #FF0000;
        }

        .bl {
            bottom: 0;
            left: 0;
            border-bottom: 5px solid #FF0000;
            border-left: 5px solid #FF0000;
        }

        .br {
            bottom: 0;
            right: 0;
            border-bottom: 5px solid #FF0000;
            border-right: 5px solid #FF0000;
        }

        /* hover */
        .container:hover .corner {
            border-color: #FF00FF;
        }

        a {
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }

        a:hover {
            color: red;
        }
    </style>

</head>

<body>
    <div class="container">

        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <br><br>

        <a href=""> <img src="src/star.jpg"></a>

    </div>
</body>
