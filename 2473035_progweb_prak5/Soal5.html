        .nav li {
            float: left;
            position: relative;

        }

            text-decoration: none;
            color: black;
            background: white;
            padding: 6px;
            border: 2px dotted grey;
        }

        .nav a:hover {
            background: black;
            color: white;
        }

        .sub {
            list-style: none;
            padding: 0;
            margin: 0;
            position: absolute;
            left: 0;
            top: 100%;
            display: none;
        }

        .nav li:hover .sub {
            display: block;
        }
        .sub a {
            border-top: none;
        }
    </style>

</head>
