<!DOCTYPE html>
<html>

<head>
    <title>2473035-Albert Zidane Meidi</title>

    <style>
        body {
            font-family: Arial;
        }

        table {
            border-collapse: collapse;
            width: 400px;
        }

        th,
        td {
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #aabbaa;
        }

        .biru {
            background-color: #aaccff;
        }

        .oren {
            background-color: #ffccaa;
        }

        .hover {
            background-color: #CCFFAA;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <th>Position</th>
            <th>Language</th>
            <th>Rating</th>
        </tr>

        <tr id="r1" class="biru" onmouseover="ubah('r1')" onmouseout="kembali('r1','biru')">
            <td>1</td>
            <td>C</td>
            <td>18.058%</td>
        </tr>

        <tr id="r2" class="oren" onmouseover="ubah('r2')" onmouseout="kembali('r2','oren')">
            <td>2</td>
            <td>Java</td>
            <td>18.051%</td>
        </tr>

        <tr id="r3" class="biru" onmouseover="ubah('r3')" onmouseout="kembali('r3','biru')">
            <td>3</td>
            <td>C++</td>
            <td>9.707%</td>
        </tr>

        <tr id="r4" class="oren" onmouseover="ubah('r4')" onmouseout="kembali('r4','oren')">
            <td>4</td>
            <td>PHP</td>
            <td>9.662%</td>
        </tr>

        <tr id="r5" class="biru" onmouseover="ubah('r5')" onmouseout="kembali('r5','biru')">
            <td>5</td>
            <td>Basic</td>
            <td>6.392%</td>
        </tr>
    </table>

    <script>
        function ubah(id) {
            document.getElementById(id).className = "hover";
        }

        function kembali(id, warna) {
            document.getElementById(id).className = warna;
        }
    </script>

</body>

</html>
